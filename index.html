<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Screen Share</title>
  
  <!-- 1. Load your styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Load QRCode library for generating QR codes -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
    <body>

      <h2>Simple Screen Share</h2>
      
      <input id="roomInput" placeholder="Enter Room Code">
      
      <div class="buttons" id="actionButtons">
        <button id="hostBtn" onclick="startHost()">Share Screen (Host)</button>
        <button id="viewBtn" onclick="joinViewer()">View Screen (Viewer)</button>
        <!-- The new Cast button -->
        <button id="castBtn" onclick="prepareToReceive()" style="background-color: var(--neon-purple); box-shadow: 0 8px 0 #7a12b8;">Receive from Phone</button>
      </div>

      <!-- The white box where the QR code will appear -->
      <div id="qrcode" style="display: none; background: white; padding: 20px; border-radius: 12px; margin: 0 auto; width: fit-content; margin-top: 1rem;"></div>
      
      <div class="video-wrapper">
        <video id="videoElement" autoplay playsinline muted></video>
        
        <!-- Mobile Quality of Life Controls (Hidden until video starts) -->
        <div id="videoControls" class="video-controls" style="display: none;">
          <button onclick="toggleFullscreen()" class="qol-btn">Full Screen</button>
          <button onclick="togglePiP()" class="qol-btn">Mini Player</button>
        </div>
      </div>

      <!-- 2. Load the secret API URL first -->
      <script src="config.js"></script>
      
      <!-- 3. Then load your main logic -->
      <script src="script.js"></script>
    

    <div id="notification-container"></div>
    
    </body>
</html>
